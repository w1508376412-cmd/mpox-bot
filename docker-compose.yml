version: '3.8'

services:
  postgres:
    image: ankane/pgvector:latest
    container_name: mpox_bot_db
    environment:
      POSTGRES_DB: mpox_bot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mpox_bot_backend
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/mpox_bot
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-deepseek-v4-flash}
      OPENAI_API_BASE: ${OPENAI_API_BASE:-https://api.deepseek.com}
      ALIBABA_API_KEY: ${ALIBABA_API_KEY}
      ALIBABA_API_BASE: ${ALIBABA_API_BASE:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-v4}
      HOST: 0.0.0.0
      PORT: 8000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
      - ./frontend:/app/frontend
      - ./prompts:/app/prompts
      - ./data:/app/data
    command: python backend/main.py

volumes:
  postgres_data:
